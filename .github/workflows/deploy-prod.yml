name: deploy-prod

# Production deployment.
# Triggered by publishing a GitHub Release (tag v*). The `prod` GitHub
# Environment is configured with required reviewers, so this job pauses for
# MANUAL APPROVAL before applying.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version label to deploy (e.g. v1.2.3)"
        required: true
        default: "manual"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.11.4"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: apply (prod)
    runs-on: ubuntu-latest
    environment: prod   # <-- protected environment => manual approval gate
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve version
        id: ver
        run: echo "version=${{ github.event.release.tag_name || github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config=backend.hcl \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform plan
        run: |
          terraform plan -input=false -out=tfplan \
            -var="app_version=${{ steps.ver.outputs.version }}"

      - name: Terraform apply
        run: terraform apply -input=false tfplan

      - name: Output endpoint
        run: terraform output -raw api_endpoint
